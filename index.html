<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vinyl Vault</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>🎵 Vinyl Vault</h1>
            <p>Your Digital Record Collection</p>
        </header>

        <section class="upload-section">
            <div class="upload-card">
                <h2>Import Your Collection</h2>
                <div class="upload-area" id="uploadArea">
                    <p>📤 Click here or drag & drop CSV</p>
                    <input type="file" id="csvUpload" accept=".csv">
                </div>
                <p class="help-text">CSV Format: Artist, Album, Year, Genre, Sub-Genre, Label, Catalog #, Format, RPM, Weight, Collections, Notes, image-url</p>
            </div>
        </section>

        <div class="controls">
            <input type="text" id="search" placeholder="🔍 Search...">
            <select id="genre"><option value="">Genre</option></select>
            <select id="format"><option value="">Format</option></select>
        </div>

        <div class="stats">
            <div><span id="total">0</span> Total</div>
            <div><span id="shown">0</span> Shown</div>
        </div>

        <div id="grid" class="grid">
            <div class="empty">📀 Upload a CSV to start</div>
        </div>
    </div>

    <div id="modal" class="modal">
        <div class="box">
            <h2>Edit Record</h2>
            <form id="form">
                <input type="text" id="in-artist" placeholder="Artist">
                <input type="text" id="in-album" placeholder="Album">
                <input type="text" id="in-year" placeholder="Year">
                <input type="text" id="in-genre" placeholder="Genre">
                <input type="text" id="in-format" placeholder="Format">
                <input type="text" id="in-collections" placeholder="Collections">
                <input type="text" id="in-image" placeholder="Image URL">
                <textarea id="in-notes" placeholder="Notes"></textarea>
                <div class="buttons">
                    <button type="button" onclick="closeModal()">Cancel</button>
                    <button type="submit">Save</button>
                </div>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
